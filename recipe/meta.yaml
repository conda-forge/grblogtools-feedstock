{% set python_max = "3.13" %}
{% set python_min = "3.8" %}
{% set name = "grblogtools" %}
{% set version = "2.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/grblogtools-{{ version }}.tar.gz
  sha256: 1eed848178823f75fb720913aae0e376320ea8eaf846d114db30e31b6aa21d14

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - wheel
    - pip
  run:
    - python >={{ python_min }},{{ python_max }}
    - ipywidgets
    - numpy
    - pandas
    - plotly
    - xlsxwriter

test:
  imports:
    - grblogtools
  commands:
    - pip check
    - pytest
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Gurobi/grblogtools
  summary: Gurobi log file tools for parsing and exploring data
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - julian-belina
